primary:
  sample:
    scope: "approved top-five cohort"
    unit: "team x scenario cell"
    inclusion:
      - "mapped"
      - "high_support"
      - "non_A1"
      - "collision_free"
    exclusion:
      - "A1 from continuous primary model"
      - "collision cells from continuous primary model"
      - "unmapped cells"
      - "cells without valid high-support conflict-window IPV summaries"
  outcome:
    name: "official coordination residual"
    residualization: "scenario + area fixed effects"
    timing: "computed only in Phase 4"
    leakage_rule: "fit residualization within training folds only"
  predictor:
    block_name: "directional_conditional_ipv_auc"
    variables:
      - "D_comp_auc_conflict_time_norm"
      - "D_yield_auc_conflict_time_norm"
    formulas:
      D_comp: "max(0, (Q_low(theta_npc,s,tau)-theta_ego)/w)"
      D_yield: "max(0, (theta_ego-Q_high(theta_npc,s,tau))/w)"
    conflict_window: "non-abstained high-support frames with current-frame inter-agent distance <= 41.31042720375975 m"
    aggregation: "trapezoidal AUC over valid conflict-window time divided by valid conflict-window duration"
  single_confirmatory_comparison:
    baseline: "state + causal kinematics + safety"
    full: "state + causal kinematics + safety + D_comp_auc_conflict_time_norm + D_yield_auc_conflict_time_norm"
    constraint: "baseline and full differ only by D_comp and D_yield"
  generalization:
    primary: "leave-one-team-out"
    secondary: "leave-one-scenario-out"
    boundary: "leave-one-family-out; no significance headline"
gate0_parameters:
  primary_history_window_frames: 10
  min_observation_frames: 4
  sensitivity_windows_frames:
    short: 5
    medium: 10
    long: 20
  sampling_contract: "10 Hz rolling prefix"
  q_low_probability: 0.25
  q_median_probability: 0.5
  q_high_probability: 0.75
  w_min_rad: 0.19634954084936207
  theta_npc_bin_width_rad: 0.39269908169872414
  state_condition: "role_rel|distance_bin|closing_bin"
  tau_definition: "min(1,(frame_index-min_observation_frames)/primary_history_window_frames)"
  high_support:
    min_exact_cell_n: 30
    min_monitor_only_n: 10
    estimator_error_max: 0.6216308869824523
    theta_npc_min_rad_q01: -1.178096549046999
    theta_npc_max_rad_q99: 1.178097245096148
    conflict_distance_max_m: 41.31042720375975
  conformal:
    alpha: 0.1
    threshold: 2.0677436745727538
    threshold_source: "InterHub calibration split high-support standardized one-sided deviation scores only"
    nsfc_nominal_coverage_claim_allowed: false
safe_subsets:
  primary_conclusion_rule: "at least two outcome-independent safe subsets must agree in IPV direction"
  S1:
    definition: "collision == 0"
    source: "PLAN_PATH Section 7"
  S2:
    definition: "safety_score == 100 AND collision == 0"
    source: "PLAN_PATH Section 7 safety-score schema only"
  S3:
    definition: "collision == 0 AND takeover == 0 AND line_crossing == 0 AND TTC >= 1.5 AND lateral_gap >= 2.0"
    thresholds:
