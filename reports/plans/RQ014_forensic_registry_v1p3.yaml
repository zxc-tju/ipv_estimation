                                    fl05_run_manifest.json, DONE]
        audit_exactly_one_of: [fl05_file_audit.json, fl05_file_audit.csv]
        validation_before_visibility: schema_counts_artifact_hashes_audit_completeness_and_fsync
        only_visibility_step: atomic_replace_of_bundle_root_CURRENT_text_pointer
        pointer_failure: old_CURRENT_and_old_bundle_unchanged_complete_orphan_generation_allowed
        immutable_after_publication: true
      cli_required: [root_repeatable, bundle_root, audit_format,
                     login_byte_budget, compute_byte_budget]
      csv_schema: [statistic_name, value, n, unit, variable_x, variable_y,
                   direction_as_recorded, dataset_scope, candidate_scope,
                   fingerprint_disposition, config_fields_as_recorded,
                   source_file, source_file_sha256, mtime, parse_status,
                   raw_locator, raw_text_as_recorded]
      supported_layouts: [wide_csv, long_csv, numeric_key_json, long_record_json,
                          markdown_statistic_local_assignment]
      numeric_validation: finite_and_correlation_range_minus1_to_plus1
      unparsed_candidates: emitted_as_rows_with_parse_status_UNPARSED_CANDIDATE
      per_file_audit: every_supported_file_including_zero_hit_with_bytes_sha256_mtime_parser_status_row_counts_and_error
      filesystem_safety:
        required_root_symlink: fatal
        any_entry_symlink: fatal_even_if_suffix_unsupported
        regular_file_open: O_NOFOLLOW_plus_root_containment_plus_pre_post_identity_check
        output_and_any_input_root_overlap_after_lexical_and_resolved_checks: forbidden
      login_node_byte_budget: 209715200
      compute_node_byte_budget: 4294967296
      over_budget_policy: only_checksum_bound_zxc_rq014_fl05_sbatch_with_matching_job_id_name_and_verification_marker_may_raise_budget
      slurm_contract:
        accepted_arguments: exactly_one_safe_RUN_ID
        durable_root: /share/home/u25310231/ZXC/RQ014_recovery
        fixed_repo_root: /share/home/u25310231/ZXC/RQ014_recovery/code/repo
        fixed_input_roots: [/share/home/u25310231/ZXC/RQ010B_wod_e2e/reframed_pref_analysis,
                            /share/home/u25310231/ZXC/RQ010B_wod_e2e/results]
        job_name: zxc-rq014-fl05
        fixed_python_interpreter: /share/home/u25310231/.conda/envs/ipv/bin/python
        python_minimum_version: '3.9'
        interpreter_realpath_version_and_sha256_recorded: true
        checksum_manifest: reports/plans/RQ014_plan_v1p3_checksums_20260711.sha256
        parser_shell_sbatch_each_have_exactly_one_matching_checksum_entry: true
        slurm_preflight_logs: /share/home/u25310231/ZXC/RQ014_recovery/zxc-rq014-fl05-%j.out_or_err
        run_logs: RUN_ROOT/logs/zxc-rq014-fl05-SLURM_JOB_ID.out_or_err
        independent_durable_stdout_stderr: required
    deliverable: historical_stats_index.csv
    fingerprint_rules:
      negative_threshold_candidate: any_structured_parsed_rho_le_minus_0.30
      attributable_historical_candidate_requires_all:
        - variable_pair_explicitly_rating_preference_or_score_vs_IPV_deviation_or_envelope
        - WOD_E2E_candidate_or_within_scene_scope_explicit
        - statistic_direction_N_unit_source_locator_source_sha_and_config_context_complete
        - parse_status_is_structured_PARSED_not_UNPARSED_CANDIDATE
      attributable_label: HISTORICAL_RATING_IPV_FINGERPRINT_CANDIDATE
      otherwise_label: UNATTRIBUTED_NEGATIVE_CORRELATION_CANDIDATE
      automatic_old_result_found_label_forbidden: true
    adjudication_contract:
      artifact: fl05_adjudication.csv
      artifact_is_separate_from_and_must_not_mutate_immutable_index_generation: true
      manifest: fl05_adjudication_manifest.json
      manifest_required_fields: [resolved_CURRENT_generation_id,
                                 resolved_CURRENT_generation_manifest_sha256,
                                 adjudication_csv_sha256, reviewer, completed_at_utc]
      required_columns: [index_row_id, source_file_sha256, raw_locator,
                         parser_disposition, scope_disposition,
                         fingerprint_disposition, reviewer, reason]
      every_index_row_accounted_for: true
      COMPLETE_WITH_UNPARSED_CANDIDATES_is_not_terminal_by_itself: true
      COMPLETE_ZERO_CANDIDATES_is_a_complete_index_state: true
      unparsed_candidate_resolution:
        - reread_exact_source_locator_and_record_structured_interpretation
        - or_mark_INACCESSIBLE_with_reason_if_source_cannot_be_resolved
      terminal_decision:
        terminal_states_mutually_exclusive: true
        precedence: [FOUND, INACCESSIBLE, NOT_FOUND_ON_SCANNED_SURFACES]
        FOUND:
          attributable_candidate_count_min: 1
          attributable_label: HISTORICAL_RATING_IPV_FINGERPRINT_CANDIDATE
          timing: after_required_adjudication
        INACCESSIBLE:
          condition: any_candidate_or_source_required_for_adjudication_cannot_be_read_or_resolved
        NOT_FOUND_ON_SCANNED_SURFACES:
          eligible_index_states:
            - COMPLETE
            - COMPLETE_ZERO_CANDIDATES
            - FULLY_ADJUDICATED_COMPLETE_WITH_UNPARSED_CANDIDATES
          attributable_candidate_count_exact: 0
          every_unparsed_candidate_resolved: true

