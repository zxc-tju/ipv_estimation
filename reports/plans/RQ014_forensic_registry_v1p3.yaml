    login_node_byte_budget: 209715200
    compute_node_byte_budget: 4294967296
    over_login_budget_policy: checksum_bound_sbatch_only
    job_name: zxc-rq014-g0-f05
    durable_output: /share/home/u25310231/ZXC/RQ014_recovery/RUN_ID/g0_pass4
    fixed_python_interpreter: /share/home/u25310231/.conda/envs/ipv/bin/python
    fixed_inputs_and_safe_RUN_ID_only: true
    preflight_and_run_durable_logs: required
  F07_F08_frozen_scope_contract:
    schema_version: rq014-frozen-scope-v1p3
    manifest_nonempty: true
    required_entry_fields: [source_path, source_sha256, snapshot_at_utc,
                            snapshot_evidence_kind, snapshot_git_repo,
                            snapshot_git_commit, snapshot_git_path]
    source_path: absolute_non_symlink_regular_file
    source_sha256: lowercase_64_hex_and_exact_byte_match
    snapshot_evidence_kind: git_blob_v1_content_integrity_only
    snapshot_git_anchor_validation: exact_commit_object_descriptive_committer_timestamp_blob_type_and_blob_sha256_match
    git_author_or_committer_timestamp_is_cutoff_evidence: false
    cutoff_exclusive_utc: '2026-07-10T00:00:00Z'
    cutoff_time_witness_contract:
      required_for_F07_or_F08_FOUND_or_NOT_FOUND: rfc3161_full_TimeStampResp_over_exact_raw_whole_scope_manifest_bytes
      time_rule: token_genTime_plus_accuracy_strictly_before_cutoff
      production_trust_material: checksum_bound_OpenSSL3_root_exact_signer_leaf_intermediates_policy_accuracy_and_revocation_contract
      manifest_CLI_or_environment_trust_override: forbidden
      git_time_fallback: forbidden
      registered_production_TSA_profile_v1p3: none
      registered_pre_cutoff_whole_inventory_receipt_v1p3: none
      current_forced_state: INACCESSIBLE_NO_PRE_CUTOFF_SCOPE_RECEIPT
      future_enablement: new_checksum_bound_amendment_and_independent_review_required
    scope_manifest_hash_bound_in_status: true
    status_additional_fields: [scope_manifest_file, scope_manifest_sha256,
                               scope_cutoff_utc, scope_entry_count,
                               scope_anchor_kind, scope_anchor_count,
                               scope_time_witness_state]
    output_either_scope_manifest_or_current_RQ014_self_contamination_after_resolved_checks: fatal
    every_source_path_component_symlink: fatal
  legal_terminal_state_rules:
    F05_F06_FOUND: complete_scan_true_and_at_least_one_full_untruncated_match_record
    F05_F06_NOT_FOUND_ON_SCANNED_SURFACES: complete_scan_true_all_required_files_FULL_READ_OK_and_zero_matches
    F07_F08_FOUND: complete_scan_true_at_least_one_full_untruncated_match_and_that_surface_whole_inventory_receipt_valid
    F07_F08_NOT_FOUND_ON_SCANNED_SURFACES: complete_scan_true_all_required_files_FULL_READ_OK_zero_matches_and_that_surface_whole_inventory_receipt_valid
    INACCESSIBLE: any_required_root_read_git_LFS_submodule_traversal_or_F07_F08_whole_inventory_receipt_failure
  missing_or_read_failure_exit_nonzero: true
  required_root_or_any_entry_symlink_exit_nonzero: true
  O_NOFOLLOW_containment_and_pre_post_identity_required: true
  inaccessible_never_relabelled_not_found: true
  output_written_outside_scanned_roots_even_if_declared_root_is_missing: required
