one_factor_test:
  statistic: delta_rho_ws_equals_defect_minus_clean_on_pairwise_common_support
  expected_direction: negative
  bootstrap_unit: scene
  bootstrap_replicates: 9999
  rng: numpy_Generator_PCG64
  seed_rule: 20260710_plus_zero_based_forensic_pair_index
  family_method: studentized_bootstrap_maxT_simultaneous_upper_bounds
  one_sided_fwer: 0.025
  empirical_DGP_calibration_gate: not_claimed_or_required_for_this_forensic_family
  calibration_boundary_wording_forbidden: true
  rationale: registered_forensic_mechanism_diagnostic_not_a_scientific_specificity_tier
  required_pre_execution_numerical_validation:
    - fixed_scene_bootstrap_operator_fixture_hash
    - global_equal_predictor_sanity_type_I_report_descriptive_only
    - zero_or_undefined_SE_invalidates_entire_twin_family
  critical_value: percentile_97p5_of_max_pair_Z_where_Z_equals_delta_b_minus_delta_obs_over_bootstrap_sd
  simultaneous_upper_bound: delta_obs_plus_critical_value_times_bootstrap_sd
  thresholds:
    maximum_defect_rho_ws: -0.30
    maximum_delta_rho_ws: -0.20
    simultaneous_upper_bound_must_be_below: 0.0
    minimum_common_support_fraction_of_clean_valid_analysis: 0.80
    maximum_undefined_bootstrap_fraction: 0.01
  allowed_claim: ARTIFACT_MECHANISM_SUPPORTED_only

